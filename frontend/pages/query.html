<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Query - The Sneh Moments</title>

<!-- Use the same path that works for your navbar logo -->
    <link rel="icon" type="image/png" href="../Assets/icons/logo.png">    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <!-- Navbar (Simplified) -->
    <nav class="navbar" style="background: var(--glass-bg); backdrop-filter: blur(15px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); padding: 15px 50px;">
        <div class="logo">
            <img src="../Assets/icons/logo.png" alt="The Sneh Moments Logo">
            <span>The Sneh Moments</span>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">Logout</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <div class="glass-card query-card fade-up visible">
            <h2>Plan Your Dream Event</h2>
            
            <form id="query-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+91 98765 432109" required>
                    </div>

                    <div class="input-group">
                        <label>Event Type</label>
                        <select required>
                            <option value="">Select Event Type...</option>
                            <option value="wedding">Wedding</option>
                            <option value="engagement">Engagement</option>
                            <option value="birthday">Birthday Celebration</option>
                            <option value="corporate">Corporate Event</option>
                            <option value="haldi_mehendi">Haldi & Mehendi</option>
                            <option value="other">Other Celebration</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Event Date</label>
                        <input type="date" required>
                    </div>

                    <div class="input-group">
                        <label>City / Venue</label>
                        <input type="text" placeholder="Desired city or venue" required>
                    </div>

                    <div class="input-group">
                        <label>Expected Guests</label>
                        <input type="number" placeholder="E.g., 500" required>
                    </div>

                    <div class="input-group full-width">
                        <label>Approximate Budget (₹)</label>
                        <select required>
                            <option value="">Select Budget Range...</option>
                            <option value="5l-10l">5 Lakhs - 10 Lakhs</option>
                            <option value="10l-25l">10 Lakhs - 25 Lakhs</option>
                            <option value="25l-50l">25 Lakhs - 50 Lakhs</option>
                            <option value="50l-1cr">50 Lakhs - 1 Crore</option>
                            <option value="1cr+">1 Crore +</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label>Special Requirements & Message</label>
                        <textarea rows="4" placeholder="Tell us more about your dream event..." required></textarea>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                    <a href="../index.html" class="btn btn-outline" style="text-align: center; width: 48%;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="width: 48%;">Submit Query</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Popup -->
    <div class="popup-overlay" id="success-popup">
        <div class="popup-content">
            <i class="fas fa-check-circle" style="font-size: 4rem; color: #4CAF50; margin-bottom: 20px;"></i>
            <h3>Thank You!</h3>
            <p style="color: var(--text-light); margin-bottom: 30px;">Your query has been submitted successfully. Our team will contact you shortly to start planning your magical moment.</p>
            <button class="btn btn-primary" id="close-popup">Return to Home</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
