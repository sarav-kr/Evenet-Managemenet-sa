<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Sneh Moments</title>

    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16x16.png">
    <link rel="manifest" href="../site.webmanifest">
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../js/script.js"></script>
</head>
<body>
    
    <!-- Navbar (Simplified for login) -->
    <nav class="navbar" style="background: var(--glass-bg); backdrop-filter: blur(15px); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); padding: 15px 50px;">
        <div class="logo">
            <img src="../Assets/icons/logo.png" alt="The Sneh Moments Logo">
            <span>The Sneh Moments</span>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">Back to Home</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <div class="glass-card fade-up visible">
            <h2 id="form-title">Welcome Back</h2>
            
            <div class="form-toggle">
                <button class="active" data-target="login">Login</button>
                <button data-target="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" action="query.html" method="GET">
                <div class="input-group">
                    <label>Email ID</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <!-- Signup Form (Hidden by default) -->
            <form id="signup-form" action="query.html" method="GET" style="display: none;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label>Email ID</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
