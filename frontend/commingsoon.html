<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon - The Sneh Moments</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body{
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#f8f4ec,#f3e7d3);
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .coming-container{
      text-align:center;
      background:rgba(255,255,255,0.2);
      backdrop-filter:blur(10px);
      padding:50px;
      border-radius:20px;
      box-shadow:0 8px 32px rgba(0,0,0,0.1);
      animation:fadeIn 1.5s ease;
    }

    h1{
      font-size:4rem;
      color:#8b5e3c;
      margin-bottom:20px;
    }

    p{
      font-size:1.2rem;
      color:#555;
      margin-bottom:30px;
    }

    .loader{
      width:60px;
      height:60px;
      border:6px solid #e0d3c2;
      border-top:6px solid #8b5e3c;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:auto;
    }

    a{
      display:inline-block;
      margin-top:30px;
      text-decoration:none;
      background:#8b5e3c;
      color:white;
      padding:12px 25px;
      border-radius:30px;
      transition:0.3s;
    }

    a:hover{
      background:#6d472d;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="coming-container">
    <h1>Coming Soon</h1>

    <p>
      We are working on something beautiful for you.
      Stay connected with The Sneh Moments ✨
    </p>

    <div class="loader"></div>

    <a href="index.html">Back to Home</a>
  </div>

</body>
</html>
