<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - The Sneh Moments</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .coming-soon-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            position: relative;
            padding: 20px;
        }

        .coming-soon-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 30, 36, 0.6); /* Dark overlay */
        }

        .coming-soon-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            /* Using the glass card style from existing CSS */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cs-logo {
            font-family: var(--font-subheading);
            font-size: 2.5rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-style: italic;
        }

        .cs-logo i {
            color: var(--primary-color);
            margin-right: 10px;
        }

        .cs-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cs-subtitle {
            font-family: var(--font-body);
            color: var(--text-light);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .notify-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .notify-form input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid rgba(141, 107, 121, 0.3);
            border-radius: 30px;
            font-family: var(--font-body);
            font-size: 1rem;
        }

        .notify-form input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .notify-form button {
            border-radius: 30px;
            white-space: nowrap;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: var(--primary-color);
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .social-links a:hover {
            color: var(--secondary-color);
            transform: translateY(-3px);
        }

        @media (max-width: 500px) {
            .notify-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <div class="coming-soon-content">
            <div class="cs-logo">
                <i class="fa-solid fa-leaf"></i>
                The Sneh Moments
            </div>
            <h1 class="cs-title">Coming Soon</h1>
            <p class="cs-subtitle">We are crafting something beautiful. Our new experience is almost ready. Leave your email to be notified when we launch!</p>
            
            <form class="notify-form" onsubmit="event.preventDefault(); alert('Thank you! We will notify you when we launch.');">
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit" class="btn btn-primary">Notify Me</button>
            </form>

            <div class="social-links">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-pinterest-p"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
